name: CI Banorte AI Assistant

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas backend
        env:
          GOOGLE_GENAI_USE_VERTEXAI: "FALSE"
          GOOGLE_API_KEY: "test-key-not-used"
        run: |
          python -m pytest -v

      - name: Validar sintaxis Python
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/agent_service.py
          python -m py_compile banorte_agent/agent.py
          python -m py_compile mcp_server/server.py

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: frontend
        run: npm ci

      - name: Construir frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8001
        run: npm run build

      - name: Construir imagen Docker
        run: |
          docker build -t banorte-ai-assistant:${{ github.sha }} .
